# Publishes the immediately.run UI release registry to this repo's GitHub Pages.
# This is the public home of the registry (the host app repo is private and can't
# serve a public Pages site). immediately.run resolves a release by name at
#   https://immediately-run.github.io/ui-releases/<name>.lock.json
# verified against https://immediately-run.github.io/ui-releases/index.json
#
# The locks here are COMMITTED, reviewed, immutable artifacts (generated by
# `@immediately-run/cli pin-release`). This workflow only VALIDATES them
# (`--check`, networkless — verifies index.json digests match the locks) and
# serves them statically. It needs NO GitHub token and can never resolve a moving
# ref behind review.
#
# One-time setup: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Publish UI release registry

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned by commit SHA, and the CLI by an exact version
      # — this workflow holds `pages: write`, so a floating tag would let an
      # upstream compromise poison the served registry. Bump deliberately.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      # Verify the committed locks are internally consistent with index.json
      # (their sha-256 digests) before serving them. No network, no writes.
      - name: Validate release locks
        run: npx -y @immediately-run/cli@0.3.0 pin-release --check --dir .

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          cp index.json *.lock.json _site/
          cat > _site/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <title>immediately.run UI release registry</title>
          <p>The <a href="https://immediately.run">immediately.run</a> UI release
          registry. See <a href="./index.json">index.json</a>.</p>
          HTML

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
